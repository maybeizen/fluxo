<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}}</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&display=swap');
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family:
        'Instrument Sans',
        -apple-system,
        BlinkMacSystemFont,
        'Segoe UI',
        Roboto,
        'Helvetica Neue',
        Arial,
        sans-serif;
      background-color: #0c0a09;
      color: #fafaf9;
    "
  >
    <table role="presentation" style="width: 100%; border-collapse: collapse">
      <tr>
        <td align="center" style="padding: 40px 20px">
          <table
            role="presentation"
            style="
              width: 100%;
              max-width: 600px;
              border-collapse: collapse;
              background-color: #1c1917;
              border: 1px solid #2d2a28;
              border-radius: 12px;
              overflow: hidden;
            "
          >
            {{CONTENT}}
            <tr>
              <td style="padding: 24px 40px; border-top: 1px solid #2d2a28">
                <p
                  style="
                    margin: 0;
                    font-size: 12px;
                    line-height: 1.6;
                    color: #78716c;
                    text-align: center;
                  "
                >
                  {{FOOTER}}
                  <br />
                  © {{YEAR}} {{APP_NAME}}. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
