<tr>
  <td style="padding: 40px; text-align: center">
    <img src="cid:logo" alt="{{APP_NAME}} Logo" width="48" style="margin: 0 auto 24px auto" />
    <h1 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 700; color: #fafaf9">Ticket Closed</h1>
    <p style="margin: 0 0 24px 0; font-size: 16px; line-height: 1.6; color: #a8a29e">
      Hi {{USERNAME}}, ticket <strong style="color: #fafaf9">{{TICKET_TITLE}}</strong> (#{{TICKET_ID}}) was closed on {{CLOSED_DATE}}.
    </p>
    <a href="{{TICKET_URL}}" style="{{CTA_STYLE}}; margin-right: 12px">View Ticket</a>
    <a href="{{NEW_TICKET_URL}}" style="display: inline-block; padding: 14px 32px; color: {{THEME_COLOR}}; text-decoration: none; font-weight: 600">Open New Ticket</a>
  </td>
</tr>
