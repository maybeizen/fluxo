<tr>
  <td style="padding: 40px; text-align: center">
    <img src="cid:logo" alt="{{APP_NAME}} Logo" width="48" style="margin: 0 auto 24px auto" />
    <h1 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 700; color: #fafaf9">New Reply on Your Ticket</h1>
    <p style="margin: 0 0 24px 0; font-size: 16px; line-height: 1.6; color: #a8a29e">
      Hi {{USERNAME}}, {{RESPONDER_NAME}} responded to <strong style="color: #fafaf9">{{TICKET_TITLE}}</strong>.
    </p>
    <div style="background-color: #181816; border: 1px solid #2d2a28; border-radius: 8px; padding: 24px; margin: 24px 0; text-align: left">
      <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #a8a29e; white-space: pre-wrap">{{MESSAGE_CONTENT}}</p>
      {{MESSAGE_IMAGES}}
    </div>
    <a href="{{TICKET_URL}}" style="{{CTA_STYLE}}">View Reply</a>
  </td>
</tr>
