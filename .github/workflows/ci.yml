name: CI

on:
    push:
        branches:
            - main
            - dev
    pull_request:
        branches:
            - main
            - dev

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    format:
        name: Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9
            - uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-
            - run: bun install --frozen-lockfile
            - run: bun run format:check

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9
            - uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-
            - run: bun install --frozen-lockfile
            - run: bun run lint

    types:
        name: Types
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: fluxo_test
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432
        steps:
            - uses: actions/checkout@v7
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9
            - uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-
            - run: bun install --frozen-lockfile
            - run: bun run types
              env:
                  CI: true
                  POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/fluxo_test

    build:
        name: Build
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: fluxo_test
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432
            redis:
                image: redis:7-alpine
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v7
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9
            - uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-
            - run: bun install --frozen-lockfile
            - run: bun run build
              env:
                  CI: true
                  POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/fluxo_test

    ci-status:
        name: CI Status
        runs-on: ubuntu-latest
        needs: [format, lint, types, build]
        if: always()
        steps:
            - name: Check CI status
              run: |
                  if [ "${{ needs.format.result }}" != "success" ] || \
                     [ "${{ needs.lint.result }}" != "success" ] || \
                     [ "${{ needs.types.result }}" != "success" ] || \
                     [ "${{ needs.build.result }}" != "success" ]; then
                    echo "CI failed"
                    exit 1
                  fi
                  echo "CI passed"
