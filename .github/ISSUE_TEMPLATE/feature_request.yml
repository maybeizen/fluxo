name: Feature request
description: Suggest an idea or enhancement for Fluxo
title: '[Feature]: '
labels:
    - enhancement
body:
    - type: markdown
      attributes:
          value: |
              Describe the problem you're trying to solve and your proposed solution.

    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What problem does this feature address?
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          description: How would you like this to work?
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Any alternative solutions or workarounds you've considered

    - type: dropdown
      id: area
      attributes:
          label: Area
          options:
              - Frontend
              - API
              - Plugins
              - CLI
              - Deployment / DevOps
              - Documentation
              - Other
      validations:
          required: true

    - type: checkboxes
      id: checklist
      attributes:
          label: Checklist
          options:
              - label: I searched existing issues and discussions
                required: true
              - label: I am willing to help implement this if needed
                required: false
