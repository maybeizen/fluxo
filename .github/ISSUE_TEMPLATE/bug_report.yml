name: Bug report
description: Report something that is broken or not working as expected
title: '[Bug]: '
labels:
    - bug
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug. Please search existing issues first.

    - type: textarea
      id: description
      attributes:
          label: What happened?
          description: A clear description of the bug
          placeholder: Describe what went wrong...
      validations:
          required: true

    - type: textarea
      id: reproduction
      attributes:
          label: Steps to reproduce
          description: Minimal steps to reproduce the behavior
          placeholder: |
              1. Go to '...'
              2. Click on '...'
              3. See error
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
      validations:
          required: true

    - type: textarea
      id: environment
      attributes:
          label: Environment
          description: OS, Bun version, browser, deployment method (Docker/server)
          placeholder: e.g. Ubuntu 24.04, Bun 1.3.9, Docker Compose
      validations:
          required: true

    - type: textarea
      id: logs
      attributes:
          label: Logs / screenshots
          description: Paste relevant logs or add screenshots (redact secrets)

    - type: checkboxes
      id: checklist
      attributes:
          label: Checklist
          options:
              - label: I searched existing issues before opening this
                required: true
              - label: I removed secrets from logs and screenshots
                required: true
